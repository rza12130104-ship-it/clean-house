<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#6366f1">
  <title>Clean House</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQ2xlYW4gSG91c2UiLCJzaG9ydF9uYW1lIjoiQ2xlYW4gSG91c2UiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBmMTcyYSIsInRoZW1lX2NvbG9yIjoiIzYzNjZmMSJ9">
  <style>
    /* === Reset & Variables === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent2: #818cf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --border: #334155;
    }

    /* === Layout === */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 100px;
    }

    /* === Header === */
    .header {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      padding: 24px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 { font-size: 24px; font-weight: 700; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    /* === Week Navigation === */
    .week-nav {
      display: flex;
      gap: 6px;
      padding: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      position: sticky;
      top: 76px;
      z-index: 99;
    }

    .week-nav button {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .week-nav button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .week-nav button .emoji { margin-right: 4px; }

    /* === Progress === */
    .progress-bar {
      margin: 0 16px 8px;
      background: var(--card);
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    .progress-text {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* === Day Cards === */
    .day-card {
      margin: 8px 16px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .day-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .day-header h3 { font-size: 16px; font-weight: 600; }
    .day-header .time-est { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .day-header .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-todo { background: rgba(99, 102, 241, 0.15); color: var(--accent2); }
    .badge-done { background: rgba(34, 197, 94, 0.15); color: var(--green); }

    /* === Tasks === */
    .day-tasks { padding: 0 16px 16px; }

    .task {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .task:last-child { border-bottom: none; }

    .task input[type=checkbox] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      margin-top: 1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .task label {
      font-size: 14px;
      line-height: 1.4;
      cursor: pointer;
      flex: 1;
    }

    .task.done label {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* === Quick Actions === */
    .swap-section {
      margin: 16px;
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .swap-section h3 { font-size: 16px; margin-bottom: 12px; }

    .swap-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      margin: 4px;
    }

    .swap-btn:active {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* === Notes === */
    .notes-section {
      margin: 16px;
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .notes-section h3 { font-size: 16px; margin-bottom: 12px; }

    .notes-section textarea {
      width: 100%;
      min-height: 80px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
    }

    /* === Toast === */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: 0.3s;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }

    /* === Swap Modal === */
    .swap-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }

    .swap-modal.show { display: flex; }

    .swap-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .swap-sheet h3 { margin-bottom: 16px; font-size: 18px; }

    .swap-option {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .swap-option:active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .swap-cancel {
      width: 100%;
      padding: 14px;
      border: none;
      background: var(--border);
      color: var(--text);
      border-radius: 12px;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🧹 Clean House</h1>
    <p>Family Cleaning Schedule</p>
  </div>

  <div class="week-nav" id="weekNav"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText"></div>

  <div id="dayCards"></div>

  <div class="swap-section">
    <h3>🔄 Quick Actions</h3>
    <button class="swap-btn" onclick="openSwap()">↔️ Swap Days</button>
    <button class="swap-btn" onclick="resetWeek()">🔄 New Week</button>
    <button class="swap-btn" onclick="skipAndStack()">📦 Skip & Stack</button>
  </div>

  <div class="notes-section">
    <h3>✏️ Notes / Changes This Week</h3>
    <textarea id="weekNotes" placeholder="Add swaps, changes, or notes here..." oninput="saveNotes()"></textarea>
  </div>

  <div class="swap-modal" id="swapModal">
    <div class="swap-sheet" id="swapSheet"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // Schedule Template (read-only reference — never mutate this)
    // ============================================================
    const SCHEDULE = {
      mon: {
        name: 'Monday', emoji: '🧽', label: 'Kitchen Reset', time: '15 min',
        tasks: [
          'Wipe counters & stovetop',
          'Dishes / load dishwasher',
          'Clean sink',
          'Quick floor sweep'
        ]
      },
      tue: {
        name: 'Tuesday', emoji: '🧹', label: 'Vacuum Day', time: '15 min',
        tasks: [
          'Quick vacuum high-traffic areas',
          'Hit dog hair spots (couch, beds)',
          'Lint roll furniture if needed'
        ]
      },
      wed: {
        name: 'Wednesday', emoji: '🚿', label: 'Bathrooms', time: '15 min',
        tasks: [
          'Wipe sinks & mirrors',
          'Scrub toilets',
          'Wipe counters',
          'Replace towels if needed'
        ]
      },
      thu: {
        name: 'Thursday', emoji: '🗂️', label: 'Tidy Up', time: '15 min',
        tasks: [
          'Pick up clutter in bedrooms',
          'Tidy office',
          "Kid's room reset",
          'Put away stray items'
        ]
      },
      fri: {
        name: 'Friday', emoji: '🧼', label: 'Floors & Trash', time: '20 min',
        tasks: [
          'Mop kitchen & bathroom floors',
          'Take out all trash & recycling',
          'Restock cleaning supplies check',
          'Quick entryway tidy'
        ]
      },
      sat: {
        name: 'Saturday', emoji: '💪', label: 'DEEP CLEAN', time: '1.5-2 hrs',
        tasks: [
          'Deep vacuum ALL rooms + furniture',
          'Mop all hard floors',
          'Scrub both bathrooms (tub, shower, grout)',
          'Dust surfaces & ceiling fans (rotate rooms)',
          'Wash dog bedding / pet area cleanup',
          'Laundry catch-up (wash, dry, fold)',
          'Clean mirrors & glass',
          'Wipe light switches & door handles'
        ]
      },
      sun: {
        name: 'Sunday', emoji: '🌅', label: 'Reset for the Week', time: '30 min',
        tasks: [
          'Meal prep area clean',
          'Quick whole-house pickup',
          'Remaining laundry fold & put away',
          'Supply restock & shopping list',
          'Set out clothes for Monday'
        ]
      }
    };

    const DAYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    const STORAGE_KEY = 'cleanhouse-v1';

    // ============================================================
    // Data Helpers
    // ============================================================
    function getWeekId() {
      const d = new Date();
      const jan1 = new Date(d.getFullYear(), 0, 1);
      const days = Math.floor((d - jan1) / 86400000);
      return `${d.getFullYear()}-W${Math.ceil((days + jan1.getDay() + 1) / 7)}`;
    }

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function save(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getWeekData() {
      const data = load();
      const wk = getWeekId();

      if (!data[wk]) {
        data[wk] = { tasks: {}, notes: '', swaps: [], stacked: {} };
        DAYS.forEach(d => {
          data[wk].tasks[d] = SCHEDULE[d].tasks.map(() => false);
          data[wk].stacked[d] = [];
        });
        save(data);
      }

      // Backfill stacked for older saved weeks
      if (!data[wk].stacked) {
        data[wk].stacked = {};
        DAYS.forEach(d => { data[wk].stacked[d] = []; });
        save(data);
      }

      return data[wk];
    }

    /** Full task list for a day = base schedule + any stacked overflow */
    function getTasksForDay(day, weekData) {
      return SCHEDULE[day].tasks.concat(weekData.stacked[day] || []);
    }

    // ============================================================
    // UI Helpers
    // ============================================================
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function toggle(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function scrollToDay(day) {
      document.getElementById('day-' + day)
        .scrollIntoView({ behavior: 'smooth', block: 'start' });
      const el = document.getElementById('tasks-' + day);
      if (el.style.display === 'none') el.style.display = 'block';
    }

    // ============================================================
    // Render
    // ============================================================
    function render() {
      const wk = getWeekData();
      const today = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];

      // Week nav
      document.getElementById('weekNav').innerHTML = DAYS.map(d => {
        const s = SCHEDULE[d];
        const done = wk.tasks[d].filter(Boolean).length;
        const total = wk.tasks[d].length;
        const check = (done === total && total > 0) ? ' ✅' : '';
        return `<button class="${d === today ? 'active' : ''}" onclick="scrollToDay('${d}')">
          <span class="emoji">${s.emoji}</span>${s.name.slice(0, 3)}${check}
        </button>`;
      }).join('');

      // Progress
      let totalTasks = 0, doneTasks = 0;
      DAYS.forEach(d => {
        totalTasks += wk.tasks[d].length;
        doneTasks += wk.tasks[d].filter(Boolean).length;
      });
      const pct = totalTasks ? Math.round(doneTasks / totalTasks * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent =
        `${doneTasks}/${totalTasks} tasks done this week (${pct}%)`;

      // Day cards
      document.getElementById('dayCards').innerHTML = DAYS.map(d => {
        const s = SCHEDULE[d];
        const allTasks = getTasksForDay(d, wk);
        const done = wk.tasks[d].filter(Boolean).length;
        const total = wk.tasks[d].length;
        const isToday = d === today;

        return `
          <div class="day-card" id="day-${d}" style="${isToday ? 'border-color:var(--accent)' : ''}">
            <div class="day-header" onclick="toggle('tasks-${d}')">
              <div>
                <h3>${s.emoji} ${s.name} — ${s.label}</h3>
                <div class="time-est">⏱️ ${s.time}${isToday ? ' • TODAY' : ''}</div>
              </div>
              <span class="badge ${done === total ? 'badge-done' : 'badge-todo'}">${done}/${total}</span>
            </div>
            <div class="day-tasks" id="tasks-${d}" style="display:${isToday ? 'block' : 'none'}">
              ${allTasks.map((t, i) => `
                <div class="task ${wk.tasks[d][i] ? 'done' : ''}">
                  <input type="checkbox" id="cb-${d}-${i}"
                    ${wk.tasks[d][i] ? 'checked' : ''}
                    onchange="toggleTask('${d}',${i})">
                  <label for="cb-${d}-${i}">${t}</label>
                </div>`).join('')}
            </div>
          </div>`;
      }).join('');

      // Notes
      document.getElementById('weekNotes').value = wk.notes || '';
    }

    // ============================================================
    // Actions
    // ============================================================
    function toggleTask(day, idx) {
      const data = load();
      const wk = data[getWeekId()];
      wk.tasks[day][idx] = !wk.tasks[day][idx];
      save(data);
      if (wk.tasks[day][idx]) toast('✅ Task done!');
      render();
    }

    function saveNotes() {
      const data = load();
      data[getWeekId()].notes = document.getElementById('weekNotes').value;
      save(data);
    }

    function resetWeek() {
      if (!confirm('Reset all tasks for this week? Notes will be kept.')) return;
      const data = load();
      const wk = data[getWeekId()];
      DAYS.forEach(d => {
        wk.tasks[d] = SCHEDULE[d].tasks.map(() => false);
        wk.stacked[d] = [];
      });
      save(data);
      toast('Week reset! Fresh start 💪');
      render();
    }

    // ============================================================
    // Skip & Stack — saves overflow in weekData.stacked, not SCHEDULE
    // ============================================================
    function skipAndStack() {
      const today = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];
      const idx = DAYS.indexOf(today);

      if (idx < 0 || idx >= 4) {
        toast("Stack works Mon–Thu only");
        return;
      }

      const next = DAYS[idx + 1];
      const data = load();
      const wk = data[getWeekId()];
      const allTasks = getTasksForDay(today, wk);

      // Collect undone tasks
      const undone = [];
      wk.tasks[today].forEach((done, i) => {
        if (!done) undone.push(allTasks[i]);
      });

      if (!undone.length) {
        toast("Nothing to stack — all done! 🎉");
        return;
      }

      // Push to next day's stacked list + extend checkbox array
      undone.forEach(t => {
        wk.stacked[next].push('📦 ' + t);
        wk.tasks[next].push(false);
      });

      // Mark today complete
      wk.tasks[today] = wk.tasks[today].map(() => true);
      save(data);
      toast(`Stacked ${undone.length} tasks → ${SCHEDULE[next].name}`);
      render();
    }

    // ============================================================
    // Swap Modal
    // ============================================================
    function openSwap() {
      const modal = document.getElementById('swapModal');
      const sheet = document.getElementById('swapSheet');
      const picks = [];

      sheet.innerHTML = `
        <h3>↔️ Swap Two Days</h3>
        <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Pick two days to swap their tasks:</p>
        <div id="swapPicks"></div>
        <button class="swap-cancel" onclick="closeSwap()">Cancel</button>`;

      DAYS.forEach(d => {
        const btn = document.createElement('div');
        btn.className = 'swap-option';
        btn.textContent = `${SCHEDULE[d].emoji} ${SCHEDULE[d].name} — ${SCHEDULE[d].label}`;
        btn.onclick = () => {
          picks.push(d);
          btn.style.background = 'var(--accent)';
          btn.style.borderColor = 'var(--accent)';
          if (picks.length === 2) {
            doSwap(picks[0], picks[1]);
            closeSwap();
          }
        };
        sheet.querySelector('#swapPicks').appendChild(btn);
      });

      modal.classList.add('show');
    }

    function closeSwap() {
      document.getElementById('swapModal').classList.remove('show');
    }

    function doSwap(a, b) {
      const data = load();
      const wk = data[getWeekId()];
      [wk.tasks[a], wk.tasks[b]] = [wk.tasks[b], wk.tasks[a]];
      save(data);
      toast(`Swapped ${SCHEDULE[a].name} ↔️ ${SCHEDULE[b].name}`);
      render();
    }

    // ============================================================
    // Init
    // ============================================================
    document.getElementById('swapModal').addEventListener('click', e => {
      if (e.target === document.getElementById('swapModal')) closeSwap();
    });

    render();
  </script>
</body>
</html>
